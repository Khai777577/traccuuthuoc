<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu Tương tác thuốc - BV Đầm Dơi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 15px; }
        .container { max-width: 550px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; margin-bottom: 5px; font-size: 1.3em; }
        .dept { text-align: center; color: #d9534f; font-weight: bold; margin-bottom: 20px; font-size: 0.85em; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; border: 1px solid #ddd; line-height: 1.5; }
        .danger { background: #fff1f0; border-color: #ffa39e !important; }
        .safe { background: #f6ffed; border-color: #b7eb8f !important; text-align: center; color: #52c41a; font-weight: bold; }
        .info-label { font-weight: bold; color: #ce1126; display: block; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>TRA CỨU TƯƠNG TÁC THUỐC</h2>
        <div class="dept">KHOA NỘI TIM MẠCH - LÃO HỌC <br> BVĐK ĐẦM DƠI</div>
        
        <input type="text" id="drug1" placeholder="Tên hoạt chất 1...">
        <input type="text" id="drug2" placeholder="Tên hoạt chất 2...">
        <button onclick="checkInteraction()">KIỂM TRA NGAY</button>
        
        <div id="result"></div>
    </div>

    <script>
        // DÁN LINK CSV CỦA BÁC SĨ VÀO ĐÂY
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4_VzE_AxnwCGX5t4hB_6UAJcIOuc-s3-ZvW7Qp9_Lc57uLKpmZKF3Ctd7M9685uYutZU-FvqGJ4FK/pub?output=csv"; 
        let drugData = [];

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                skipEmptyLines: 'graceful',
                complete: function(results) {
                    // Lọc bỏ các dòng trắng hoặc dòng chỉ chứa tiêu đề
                    drugData = results.data.filter(row => row.length >= 2 && row[0] !== "");
                    console.log("Đã tải " + drugData.length + " dòng dữ liệu");
                }
            });
        }
        loadData();

        function checkInteraction() {
            const d1 = document.getElementById('drug1').value.toLowerCase().trim();
            const d2 = document.getElementById('drug2').value.toLowerCase().trim();
            const resDiv = document.getElementById('result');

            if (!d1 || !d2) { alert("Bác sĩ vui lòng nhập đủ 2 thuốc"); return; }

            // Tìm kiếm dữ liệu dựa trên mảng (không phụ thuộc tên tiêu đề)
            const interaction = drugData.find(row => {
                const colA = (row[0] || "").toLowerCase();
                const colB = (row[1] || "").toLowerCase();
                return (colA.includes(d1) && colB.includes(d2)) || (colA.includes(d2) && colB.includes(d1));
            });

            resDiv.style.display = 'block';
            if (interaction) {
                resDiv.className = "danger";
                resDiv.innerHTML = `<div style="font-weight:bold; color:#cf1322; text-align:center; margin-bottom:10px;">CẢNH BÁO TƯƠNG TÁC CHỐNG CHỈ ĐỊNH</div>` +
                                   `<span class="info-label">Cơ chế:</span> ${interaction[2] || "Chưa rõ"}` +
                                   `<span class="info-label">Hậu quả:</span> ${interaction[3] || "Nguy hiểm"}` +
                                   `<span class="info-label">Xử trí:</span> ${interaction[4] || "Liên hệ dược lâm sàng"}`;
            } else {
                resDiv.className = "safe";
                resDiv.innerHTML = "Không tìm thấy tương tác trong danh mục hiện có.";
            }
        }
    </script>
</body>
</html>
