<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f7f6; }
        .box { border: 2px solid #0056b3; padding: 20px; border-radius: 12px; background: white; }
        .dept { text-align: center; color: #ce1126; font-weight: bold; margin-bottom: 15px; font-size: 0.9em; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #res { margin-top: 20px; display: none; padding: 15px; border-radius: 10px; line-height: 1.6; border: 1px solid #ddd; }
        .danger { background: #fff1f0; border-left: 6px solid #f5222d !important; }
        .safe { background: #f6ffed; border-left: 6px solid #52c41a !important; text-align: center; color: #52c41a; font-weight: bold; }
        b { color: #ce1126; }
    </style>
</head>
<body>
    <div class="box">
        <div class="dept">KHOA NỘI TIM MẠCH - LÃO HỌC <br> BV ĐA KHOA ĐẦM DƠI</div>
        <input type="text" id="d1" placeholder="Tên thuốc 1 (VD: amio)">
        <input type="text" id="d2" placeholder="Tên thuốc 2 (VD: sotalol)">
        <button onclick="check()">TRA CỨU LÂM SÀNG</button>
        <div id="res"></div>
    </div>

    <script>
        // DỮ LIỆU ĐÃ TÍCH HỢP SẴN TỪ QĐ 5948/QĐ-BYT
        const data = [
            ["amiodaron", "sotalol", "Hiệp đồng tăng tác dụng", "Tăng nguy cơ kéo dài khoảng QT, xoắn đỉnh [cite: 176]", "Chống chỉ định phối hợp ở bệnh nhân có hội chứng QT kéo dài [cite: 176]"],
            ["digoxin", "amiodaron", "Amiodaron ức chế P-gp làm giảm thải trừ digoxin [cite: 990]", "Tăng nồng độ digoxin, tăng nguy cơ ngộ độc [cite: 991]", "Cần giảm liều digoxin và theo dõi chặt chẽ [cite: 994, 995]"],
            ["benazepril", "sacubitril/valsartan", "Tăng tích lũy bradykinin [cite: 202, 916]", "Tăng nguy cơ phù mạch [cite: 202, 916]", "Chống chỉ định. Chỉ dùng Sacubitril sau khi ngừng ACEI ít nhất 36 giờ [cite: 202, 917]"],
            ["clopidogrel", "esomeprazol", "Ức chế CYP2C19 [cite: 1040]", "Giảm tác dụng kháng kết tập tiểu cầu [cite: 1040]", "Tránh phối hợp, ưu tiên dùng thuốc khác ít tương tác hơn [cite: 1041]"],
            ["rivaroxaban", "ketoconazole", "Ức chế CYP3A4 và P-gp", "Tăng nồng độ rivaroxaban, nguy cơ xuất huyết", "Chống chỉ định phối hợp"],
            ["simvastatin", "amiodaron", "Amiodaron ức chế chuyển hóa simvastatin [cite: 990]", "Tăng nguy cơ tiêu cơ vân [cite: 991]", "Chống chỉ định nếu simvastatin > 20mg/ngày [cite: 994]"],
            ["warfarin", "tamoxifen", "Tamoxifen ức chế CYP2C9 [cite: 154, 999]", "Tăng nguy cơ xuất huyết [cite: 154, 999]", "Chống chỉ định ở bệnh nhân dự phòng tiên phát ung thư vú [cite: 154, 1000]"],
            ["dabigatran", "itraconazol", "Itraconazol ức chế P-gp làm giảm thải trừ dabigatran [cite: 258, 1030]", "Tăng nồng độ dabigatran, tăng nguy cơ xuất huyết [cite: 258, 1030]", "Chống chỉ định phối hợp [cite: 258, 1003]"],
            ["nitroglycerin", "sildenafil", "Hiệp đồng tăng nồng độ cGMP gây giãn mạch [cite: 914]", "Hạ huyết áp nghiêm trọng [cite: 914]", "Chống chỉ định phối hợp. Cách nhau ít nhất 24 giờ [cite: 915]"]
        ];

        function check() {
            const v1 = document.getElementById('d1').value.toLowerCase().trim();
            const v2 = document.getElementById('d2').value.toLowerCase().trim();
            const res = document.getElementById('res');
            if(!v1 || !v2) return;

            // Tìm kiếm thông minh (chứa từ khóa)
            const found = data.find(row => {
                const c1 = row[0].toLowerCase();
                const c2 = row[1].toLowerCase();
                return (c1.includes(v1) && c2.includes(v2)) || (c1.includes(v2) && c2.includes(v1));
            });

            res.style.display = 'block';
            if(found) {
                res.className = "danger";
                res.innerHTML = `<h4 style="margin:0;color:#cf1322">PHÁT HIỆN TƯƠNG TÁC</h4>` +
                                `<div><b>Cơ chế:</b> ${found[2]}</div>` +
                                `<div><b>Hậu quả:</b> ${found[3]}</div>` +
                                `<div><b>Xử trí:</b> ${found[4]}</div>`;
            } else {
                res.className = "safe";
                res.innerHTML = "Không tìm thấy tương tác chống chỉ định trong danh mục nhanh (Cặp thuốc này có thể an toàn hoặc chưa được nạp vào máy).";
            }
        }
    </script>
</body>
</html>
